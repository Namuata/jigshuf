<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SailRx Telehealth — 728×90 Leaderboard</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 728px;
        height: 90px;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }

      .banner {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        color: #1f3a4d;
        text-decoration: none;
        background: linear-gradient(90deg, #f5f0e6 0%, #ede4d3 55%, #e6dcc6 100%);
        overflow: hidden;
      }

      .banner::before {
        content: "";
        position: absolute;
        inset: -50%;
        background: radial-gradient(circle at 80% 50%, rgba(74, 144, 191, 0.18) 0%, transparent 55%);
        pointer-events: none;
      }

      .banner::after {
        content: "";
        position: absolute;
        right: -30px;
        top: -30px;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: rgba(74, 144, 191, 0.08);
        pointer-events: none;
      }

      .left {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 14px;
        flex: 1;
        min-width: 0;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        border-radius: 999px;
        background: rgba(74, 144, 191, 0.12);
        backdrop-filter: blur(4px);
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: #2b5a7c;
        flex-shrink: 0;
      }

      .pill-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #4a90bf;
        box-shadow: 0 0 8px rgba(74, 144, 191, 0.6);
      }

      .text-stack {
        display: flex;
        flex-direction: column;
        gap: 1px;
        min-width: 0;
      }

      .headline {
        font-size: 18px;
        line-height: 1.1;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: #1f3a4d;
      }

      .subheadline {
        font-size: 12px;
        opacity: 0.9;
        color: #3d5a70;
      }

      .promo {
        font-size: 11px;
        font-weight: 700;
        color: #2b5a7c;
        margin-top: 2px;
      }

      .promo-code {
        background: rgba(74, 144, 191, 0.15);
        padding: 1px 6px;
        border-radius: 4px;
        color: #1f3a4d;
      }

      .right {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        gap: 14px;
        flex-shrink: 0;
      }

      .brand {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: #1f3a4d;
      }

      .brand span {
        color: #4a90bf;
        font-weight: 500;
      }

      .cta {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 9px 16px;
        border-radius: 8px;
        background: #4a90bf;
        color: #ffffff;
        font-size: 13px;
        font-weight: 700;
        box-shadow: 0 4px 14px rgba(74, 144, 191, 0.25);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .cta svg {
        width: 13px;
        height: 13px;
        flex-shrink: 0;
      }

      .banner:hover .cta {
        transform: translateY(-1px);
        box-shadow: 0 6px 18px rgba(74, 144, 191, 0.35);
      }

      .sponsored {
        position: absolute;
        bottom: 4px;
        left: 20px;
        font-size: 8px;
        opacity: 0.55;
        color: #5a6f7f;
      }
    </style>
  </head>
  <body>
    <a href="https://sailrx.co" target="_blank" rel="noopener sponsored" class="banner" aria-label="SailRx - Clinician-reviewed treatments, shipped to your door. Use code jigshuffle for 25 dollars off. Visit sailrx.co">
      <div class="left">
        <div class="pill">
          <span class="pill-dot"></span>
          Telehealth
        </div>
        <div class="text-stack">
          <h1 class="headline">Medical expertise. Lasting Transformation.</h1>
          <p class="subheadline">No insurance, no waiting rooms, just a clear path forward.</p>
          <p class="promo">Use code <span class="promo-code">jigshuffle</span> for $25 off all orders</p>
        </div>
      </div>

      <div class="right">
        <div class="brand">SailRx<span>.co</span></div>
        <div class="cta">
          Visit SailRx
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14"></path>
            <path d="m12 5 7 7-7 7"></path>
          </svg>
        </div>
      </div>

      <span class="sponsored">Sponsored</span>
    </a>
  </body>
</html>
